<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML Characters & Symbols</title>
  </head>
  <body>
    <!-- HTML entities are used to display special characters in the browser. -->
    &equiv; <!-- Equivalent symbol -->
    <br />
    &twoheadleftarrow; <!-- Left arrow with two heads -->
    <br />
    &twoheadrightarrow; <!-- Right arrow with two heads -->
    <br />
    &harrw; <!-- Double-headed arrow -->
    <br />
    &blacktriangledown; <!-- Black triangle pointing down -->
    <br />
    &blacktriangle; <!-- Black triangle pointing up -->
    <br />
    &copy; <!-- Copyright symbol -->
    <br />
    &lt; <!-- Less-than symbol -->
    <br />
    &gt; <!-- Greater-than symbol -->
    <br />
    &amp; <!-- Ampersand symbol -->
    <br />
    &dollar; <!-- Dollar currency symbol -->
    <br />
    &trade; <!-- Trademark symbol -->
    <br />
    &reg; <!-- Registered trademark symbol -->
    <br />
    &nbsp; <!-- Non-breaking space: keeps text together. -->
  </body>
</html>
