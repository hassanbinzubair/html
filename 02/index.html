<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Headings in HTML</title>
  </head>
  <body>
    <!-- There are six headings in HTML, from h1 to h6 -->
    <!-- Use headings in order to create a strong document structure -->
    <h1>Most important heading</h1>
    <!-- h1 is the top-level heading and should describe the page or section -->
    <h2>Another heading H2</h2>
    <h3>Another heading H3</h3>
    <h4>Another heading H4</h4>
    <h5>Another heading H5</h5>
    <!-- h6 is the smallest heading and is used for less important titles -->
    <h6>Another heading H6</h6>
  </body>
</html>
