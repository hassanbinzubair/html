<!-- Declares this document as HTML5 -->
<!doctype html>
<html lang="en">
  <!-- The root element for the page; lang helps accessibility and search engines -->
  <head>
    <meta charset="UTF-8" />
    <!-- UTF-8 character encoding supports most text and symbols -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Makes the page responsive on mobile devices -->
    <title>Hello World</title>
    <!-- The title appears in the browser tab and search results -->
  </head>
  <body>
    <!-- The visible page content goes inside the body element -->
    <h1>Hello World</h1>
    <!-- h1 is the highest-level heading and should be used once per page when possible -->
    <p>This is a Paragraph</p>
    <!-- p defines a paragraph of text -->
  </body>
</html>
