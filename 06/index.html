<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Links</title>
  </head>
  <body>
    <!-- The <a> element creates a hyperlink using the href attribute. -->
    <br />
    <!-- target="_blank" opens the link in a new tab. rel="noopener noreferrer" improves security. -->
    <a target="_blank" rel="noopener noreferrer" href="link.html">Go to another page of this website</a>
    <br />
    <!-- Use an absolute URL to link to an external website. -->
    <a href="https://www.youtube.com">Go to YouTube (External Website)</a>
    <br />
    <!-- mailto links open the user's email application. -->
    <a href="mailto:example@gmail.com">Mail To Someone</a>
    <br />
    <!-- tel links open the phone dialer on supported devices. -->
    <a href="tel:+923001234567">Call Someone</a>
    <br />
    <!-- Use an internal link to jump to an element with the matching id. -->
    <a href="#part_of_page">Scroll to the part of this page</a>
    <br />
    <h2 id="part_of_page">Part of this page</h2>
    <p>This is the target section for the #part_of_page link.</p>
  </body>
</html>
