<!doctype html>
<html lang="en">
  <head>
    <!-- Provide a concise summary of the page content using the meta description. -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="This is an example page demonstrating SEO best practices in HTML."
    />
    <meta name="author" content="Hassan" />
    <meta name="robots" content="index, follow" />
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
    <!-- The title should clearly describe the page for both users and search engines. -->
    <title>SEO</title>
  </head>
  <body>
    <nav>
      <!-- Use to create a navigation bar -->
    </nav>
    <header>
      <!-- Use a meaningful heading to improve SEO and accessibility. -->
      <h1>SEO Friendly Page</h1>
    </header>
    <main>
      <section>
        <p>
          <!-- Use descriptive alt text for images. -->
          <img src="crow.jpg" alt="picture of crow" />
        </p>
      </section>
    </main>
    <footer>
      <!-- Proper page structure and accessible content help search engines and users. -->
    </footer>
  </body>
</html>
