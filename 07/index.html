<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Div & Span</title>
</head>
<body>
    <!-- div is a block-level container used to group larger content sections. -->
    <div>
        <h1>Heading of div</h1>
        <p>Paragraph of div</p>
    </div>
    <!-- span is an inline container used to style or wrap small pieces of text. -->
    <p>This is a <span>highlighted</span> word in a sentence.</p>
    <!-- A span should not contain block-level elements such as h1 or p. -->
</body>
</html>
