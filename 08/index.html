<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lists</title>
  </head>
  <body>
    <!-- Ordered list: items are numbered and use the ol element. -->
    <h1>Ordered List</h1>
    <ol>
      <li>Hassan1</li>
      <li>Hassan2</li>
      <li>Hassan3</li>
      <li>Hassan4</li>
      <li>Hassan5</li>
    </ol>
    <!-- Unordered list: items are displayed with bullets and use the ul element. -->
    <h1>Unordered List</h1>
    <ul>
      <li>Hassan1</li>
      <li>Hassan2</li>
      <li>Hassan3</li>
      <li>Hassan4</li>
      <li>Hassan5</li>
    </ul>
    <!-- Definition list: use dt for terms and dd for definitions. -->
    <h1>Definition List</h1>
    <h2>A BEAUTIFUL ANALOGY</h2>
    <dl>
      <dt>HTML :</dt>
      <dd>Car body (only metal)</dd>
      <dt>CSS:</dt>
      <dd>Car paint, decoration etc.</dd>
      <dt>JavaScript:</dt>
      <dd>Car engine + Interior logic</dd>
    </dl>
  </body>
</html>
