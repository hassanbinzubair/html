<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Semantic Tags & Page Layout</title>
  </head>
  <body>
    <header>
      <!-- Header contains the page title, logo, or other introductory content. -->
    </header>
    <nav>
      <!-- Navigation contains links to other pages or sections of the site. -->
    </nav>
    <main>
      <!-- Main is the primary content area of the page. -->
      <section>
        <!-- Section groups related content together. -->
        <article>
          <!-- Article contains a self-contained piece of content such as a blog post or news story. -->
        </article>
      </section>
      <aside>
        <!-- Aside holds secondary content such as ads, related links, or notes. -->
      </aside>
    </main>
    <footer>
        <!-- Footer contains copyright, contact info, or legal notes. -->
    </footer>
  </body>
</html>
