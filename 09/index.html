<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table</title>
  </head>
  <body>
    <!-- The table element represents tabular data with rows and columns. -->
    <table>
      <!-- The caption element provides a title for the table. -->
      <caption>Students Report</caption>
      <!-- Thead contains header rows for the table. -->
      <thead>
        <tr>
          <th scope="col">Name</th>
          <th scope="col">Roll NO</th>
          <th scope="col">Grade</th>
        </tr>
      </thead>
      <!-- Tbody contains the main rows of table data. -->
      <tbody>
        <tr>
          <td>Hassan</td>
          <td>110010</td>
          <td>A+</td>
        </tr>
        <tr>
          <td>Ali</td>
          <td>110011</td>
          <td>A+</td>
        </tr>
        <tr>
          <td>Kaif</td>
          <td>110012</td>
          <td>A+</td>
        </tr>
      </tbody>
      <!-- Tfoot is used for summary rows or totals. -->
      <tfoot>
        <tr>
          <td colspan="3">This table shows a simple student report example.</td>
        </tr>
      </tfoot>
    </table>
  </body>
</html>
