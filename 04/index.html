<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Images, Audio & Videos</title>
  </head>
  <body>
    <!-- The img element embeds an image in the page. -->
    <!-- width and height help reserve space before the image loads. -->
    <!-- alt text is shown if the image cannot load and helps screen readers. -->
    <img width="500" height="500" src="img.png" alt="My Image" />

    <!-- The audio element plays sound. Use source elements for multiple formats. -->
    <audio controls autoplay loop>
      <source src="Alarm04.wav" type="audio/wav" />
      Your browser does not support the audio element.
    </audio>
    <!-- controls shows playback controls, autoplay starts playback automatically, loop repeats. -->

    <!-- The video element embeds a video. poster displays an image before playback. -->
    <video height="300" width="500" controls autoplay poster="img.png">
      <source
        src="New_Naat_2021____Asad_Raza_Attari____Madni_Da_Dera____Official_Video(360p).mp4"
        type="video/mp4"
      />
      Your browser does not support the video element.
      
    </video>
  </body>
</html>
